services:
  - type: web
    name: knowledgegraph-ai-multiagent-rag
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn src.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: KG_DATA_DIR
        value: data/sample_docs
